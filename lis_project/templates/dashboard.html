<!DOCTYPE html>
<html>
<head>
    <title>LIS Dashboard</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #eef2f7;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            width: 220px;
            padding-top: 20px;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        /* Main */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Cards */
        .card-box {
            border-radius: 12px;
            padding: 20px;
            color: white;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .bg1 { background: linear-gradient(45deg, #4facfe, #00f2fe); }
        .bg2 { background: linear-gradient(45deg, #43e97b, #38f9d7); }
        .bg3 { background: linear-gradient(45deg, #fa709a, #fee140); }
        .bg4 { background: linear-gradient(45deg, #667eea, #764ba2); }

        .card-box i {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<!-- 🔹 SIDEBAR -->
<div class="sidebar">
    <h4>LIS System</h4>
    <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/patients/"><i class="bi bi-people"></i> Patients</a>
    <a href="/tests/"><i class="bi bi-clipboard2-pulse"></i> Tests</a>
    <a href="/reports/"><i class="bi bi-bar-chart"></i> Reports</a>
    <a href="/contact/"><i class="bi bi-envelope"></i> Contact</a>
</div>

<!-- 🔹 MAIN -->
<div class="main">

    <!-- Topbar -->
    <div class="topbar d-flex justify-content-between">
        <h5>Dashboard</h5>
        <span>Welcome, Admin</span>
    </div>

    <!-- Cards -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card-box bg1 text-center">
                <i class="bi bi-people"></i>
                <h5>Total Patients</h5>
                <h2>{{ total_patients }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg2 text-center">
                <i class="bi bi-person-plus"></i>
                <h5>Add Patient</h5>
                <a href="/patients/" class="btn btn-light btn-sm mt-2">Go</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg3 text-center">
                <i class="bi bi-clipboard-data"></i>
                <h5>Tests</h5>
                <a href="/tests/" class="btn btn-light btn-sm mt-2">View</a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg4 text-center">
                <i class="bi bi-graph-up"></i>
                <h5>Reports</h5>
                <a href="/reports/" class="btn btn-light btn-sm mt-2">View</a>
            </div>
        </div>

    </div>

    <!-- Table (Recent Patients placeholder) -->
    <div class="table-container mt-5">
        <h5>Recent Activity</h5>
        <table class="table mt-3">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Patient Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Sample Patient</td>
                    <td><span class="badge bg-success">Active</span></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
