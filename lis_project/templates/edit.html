<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 30px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input::placeholder {
            color: #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        .back a {
            color: #ddd;
            text-decoration: none;
            font-size: 14px;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>✏️ Edit Patient</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="name" value="{{ patient.name }}" placeholder="Patient Name" required>
            </div>

            <div class="input-group">
                <input type="number" name="age" value="{{ patient.age }}" placeholder="Age" required>
            </div>

            <div class="input-group">
                <input type="text" name="disease" value="{{ patient.disease }}" placeholder="Disease" required>
            </div>

            <button type="submit">Update Patient</button>
        </form>

        <div class="back">
            <a href="/patients/">← Back to Patients</a>
        </div>
    </div>

</body>
</html>
