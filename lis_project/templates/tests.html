<!DOCTYPE html>
<html>
<head>
    <title>Lab Tests</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* FORM */
        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input, select {
            padding: 8px;
            margin-right: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 15px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2e59d9;
        }

        /* CARD */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .status {
            float: right;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-size: 12px;
        }

        .completed {
            background: green;
        }

        .pending {
            background: orange;
        }

        .result {
            margin-top: 10px;
            padding: 10px;
            background: #e9f7ef;
            border-left: 4px solid green;
        }

        .update-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            background: orange;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
        }

        .update-btn:hover {
            background: darkorange;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🧪 Lab Tests</h1>

    <!-- ✅ ADD TEST -->
    <form method="POST">
        {% csrf_token %}

        <select name="patient" required>
            <option value="">Select Patient</option>
            {% for p in patients %}
                <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>

        <input type="text" name="test_name" placeholder="Test Name" required>

        <button type="submit">Add Test</button>
    </form>

    <!-- ✅ TEST LIST -->
    {% for t in tests %}
        <div class="card">

            <strong>{{ t.patient.name }}</strong> - {{ t.test_name }}

            <!-- ✅ AUTO STATUS FIX -->
            <span class="status {% if t.result %}completed{% else %}pending{% endif %}">
                {% if t.result %}Completed{% else %}Pending{% endif %}
            </span>

            <br>

            {% if not t.result %}
                <!-- ✅ UPDATE BUTTON -->
                <a href="{% url 'update_result' t.id %}" class="update-btn">
                    Add Result
                </a>
            {% else %}
                <!-- ✅ RESULT DISPLAY -->
                <div class="result">
                    <strong>Result:</strong><br>
                    {{ t.result }}
                </div>
            {% endif %}

        </div>
    {% empty %}
        <p>No tests available</p>
    {% endfor %}

</div>

</body>
</html>
